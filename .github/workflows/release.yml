name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build ${{ matrix.artifact }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          for f in aivo-*; do sha256sum "$f" > "$f.sha256"; done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: "Release ${{ github.ref_name }}"
          files: artifacts/*
